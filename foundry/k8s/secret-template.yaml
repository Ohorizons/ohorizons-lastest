---
# Foundry Agents service — credentials consumed by the ai-chat backend in the backstage namespace.
# Source values are mirrored from `foundry-agents-config` in ns `backstage`
# (created by bootstrap-aro.sh). Apply *after* that secret exists.
apiVersion: v1
kind: Secret
metadata:
  name: foundry-agents-config
  namespace: ai-services
  labels:
    app.kubernetes.io/name: foundry-agents
    app.kubernetes.io/part-of: open-horizons
type: Opaque
stringData:
  # Optional bearer token clients must send (ai-chat backend, etc.)
  SERVICE_API_KEY: "REPLACE_WITH_RANDOM_TOKEN"
  # Tunables
  AZURE_OPENAI_API_VERSION: "2024-08-01-preview"
  AZURE_OPENAI_DEPLOYMENT: "gpt-4o"
  AZURE_OPENAI_EMBEDDING_DEPLOYMENT: "text-embedding-3-large"
  COSMOS_MEMORY_ENABLED: "true"
  COSMOS_ENDPOINT: "https://cosmos-openhorizons-dev-agents.documents.azure.com:443/"
  COSMOS_DATABASE_NAME: "enterprise_memory"
  COSMOS_CONTAINER_NAME: "thread-message-store"
  COSMOS_TENANT_ID: "dev"
  LOG_LEVEL: "INFO"
  REQUEST_TIMEOUT_SECONDS: "60"
---
# Sensitive Azure OpenAI credentials are NOT stored here directly.
# Use ExternalSecrets or copy from `foundry-agents-config`:
#   kubectl get secret foundry-agents-config -n backstage -o yaml \
#     | yq '.data | with_entries(select(.key | test("^AZURE_OPENAI_(API_KEY|ENDPOINT)$")))' \
#     | oc create secret generic foundry-agents-azure-openai \
#         -n ai-services --from-file=/dev/stdin
# OR populate via External Secrets Operator from Azure Key Vault.
