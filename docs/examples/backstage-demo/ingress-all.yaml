# =============================================================================
# DEMO ONLY — Monitoring ingress bundle
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus-ingress
  namespace: monitoring
  annotations:
    open-horizons.io/profile: demo-only
spec:
  ingressClassName: nginx
  rules:
    - host: prometheus.${DEMO_LB_IP}.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-kube-prometheus-prometheus
                port:
                  number: 9090
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alertmanager-ingress
  namespace: monitoring
  annotations:
    open-horizons.io/profile: demo-only
spec:
  ingressClassName: nginx
  rules:
    - host: alertmanager.${DEMO_LB_IP}.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-kube-prometheus-alertmanager
                port:
                  number: 9093