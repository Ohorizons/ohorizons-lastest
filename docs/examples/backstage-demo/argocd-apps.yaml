# =============================================================================
# DEMO ONLY — ArgoCD app bundle
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-backstage
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: open-horizons
    open-horizons/horizon: h2
  annotations:
    open-horizons.io/profile: demo-only
spec:
  project: default
  source:
    repoURL: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}
    targetRevision: ${GITHUB_BRANCH:-main}
    path: deploy/helm
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-monitoring
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: open-horizons
    open-horizons/horizon: h2
  annotations:
    open-horizons.io/profile: demo-only
spec:
  project: default
  source:
    repoURL: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}
    targetRevision: ${GITHUB_BRANCH:-main}
    path: prometheus
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-argocd-config
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: open-horizons
    open-horizons/horizon: h2
  annotations:
    open-horizons.io/profile: demo-only
spec:
  project: default
  source:
    repoURL: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}
    targetRevision: ${GITHUB_BRANCH:-main}
    path: argocd
  destination:
    server: https://kubernetes.default.svc
