# =============================================================================
# DEMO ONLY — Backstage v1.48.0 values
# =============================================================================
# This file is intentionally outside deploy/helm/. It is retained as a workshop
# reference and is not part of the enterprise deployment path.
# =============================================================================

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/server-snippet: |
      location = /favicon.ico {
        return 302 https://learn.microsoft.com/favicon.ico;
      }
  host: backstage.${DEMO_LB_IP}.sslip.io
  path: /

backstage:
  replicas: 1

  image:
    registry: ghcr.io
    repository: backstage/backstage
    tag: "1.48.0"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  containerSecurityContext:
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault

  appConfig:
    app:
      title: "Open Horizons | Agentic DevOps Platform"
      baseUrl: http://backstage.${DEMO_LB_IP}.sslip.io
    organization:
      name: "Open Horizons — Agentic DevOps Platform"
    backend:
      baseUrl: http://backstage.${DEMO_LB_IP}.sslip.io
      listen:
        port: 7007
      cors:
        origin: http://backstage.${DEMO_LB_IP}.sslip.io
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
    auth:
      environment: development
      providers:
        guest:
          dangerouslyAllowOutsideDevelopment: true

postgresql:
  enabled: true
  auth:
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password