<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description"
      content="Enterprise developer portal for Agentic Platform Engineering, built on Backstage, Azure, and GitHub." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Enterprise Developer Portal" />
    <meta property="og:description"
      content="Secure access to the enterprise developer portal for Agentic Platform Engineering." />
    <meta property="og:image" content="<%= publicPath %>/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Developer Portal" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Enterprise Developer Portal" />
    <meta name="twitter:description"
      content="Secure access to the enterprise developer portal for Agentic Platform Engineering." />
    <meta name="twitter:image" content="<%= publicPath %>/og-image.png" />

    <!-- LinkedIn -->
    <meta property="og:locale" content="en_US" />

    <!-- Additional SEO -->
    <meta name="author" content="Developer Portal" />
    <meta name="keywords"
      content="Agentic Platform Engineering, Platform Engineering, Developer Portal, Backstage, Azure, GitHub, Golden Paths, Software Catalog" />

    <link rel="manifest" href="<%= publicPath %>/manifest.json" crossorigin="use-credentials" />
    <link rel="icon" type="image/svg+xml" href="<%= publicPath %>/favicon.svg" />
    <link rel="icon" href="<%= publicPath %>/favicon.ico" />
    <link rel="shortcut icon" href="<%= publicPath %>/favicon.ico" />
    <link rel="apple-touch-icon" href="<%= publicPath %>/apple-touch-icon.png" />
    <link rel="icon" type="image/x-icon" href="<%= publicPath %>/favicon.ico" />
    <link rel="mask-icon" href="<%= publicPath %>/safari-pinned-tab.svg" color="#5bbad5" />
    <title><%= config.getOptionalString('app.title') ?? 'Backstage' %></title>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `yarn start`.
      To create a production bundle, use `yarn build`.
    -->
  </body>

</html>
