# Agentic DevOps Platform — Open Horizons (Backstage) Production Config
app:
  title: ${PORTAL_NAME:-Open Horizons} — Agentic DevOps Platform
  baseUrl: ${APP_BASE_URL}

organization:
  name: ${PORTAL_NAME:-Open Horizons}

platform:
  githubRepository: ${GITHUB_ORG}/${GITHUB_REPO}

backend:
  baseUrl: ${APP_BASE_URL}
  listen:
    port: 7007
  auth:
    externalAccess:
      - type: static
        options:
          token: ${BACKEND_SECRET}
          subject: external
    keys:
      - secret: ${BACKEND_SECRET}
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: ${POSTGRES_DATABASE:-backstage}

auth:
  environment: production
  providers:
    github:
      production:
        clientId: ${GITHUB_APP_CLIENT_ID}
        clientSecret: ${GITHUB_APP_CLIENT_SECRET}
        scopes:
          - repo
          - codespace
          - read:org
        signIn:
          resolvers:
            - resolver: usernameMatchingUserEntityName

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}
      apps:
        - appId: ${GITHUB_APP_ID}
          clientId: ${GITHUB_APP_CLIENT_ID}
          clientSecret: ${GITHUB_APP_CLIENT_SECRET}
          privateKey: ${GITHUB_APP_PRIVATE_KEY}

proxy:
  endpoints: {}

techdocs:
  builder: local
  generator:
    runIn: local
  publisher:
    type: local

scaffolder: {}

