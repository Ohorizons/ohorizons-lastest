# Agentic DevOps Platform — Open Horizons (Backstage) Production Config
app:
  title: ${PORTAL_NAME:-Open Horizons} — Agentic DevOps Platform
  baseUrl: ${APP_BASE_URL:-http://localhost:7007}

organization:
  name: ${PORTAL_NAME:-Open Horizons}

backend:
  baseUrl: ${APP_BASE_URL:-http://localhost:7007}
  listen:
    port: 7007
  auth:
    dangerouslyDisableDefaultAuthPolicy: true
    externalAccess:
      - type: static
        options:
          token: ${BACKEND_SECRET:-supersecret-dev-only}
          subject: external
    keys:
      - secret: ${BACKEND_SECRET:-supersecret-dev-only}
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}

auth:
  environment: development
  providers:
    github:
      development:
        clientId: ${GITHUB_APP_CLIENT_ID}
        clientSecret: ${GITHUB_APP_CLIENT_SECRET}
        scopes:
          - repo
          - codespace
        signIn:
          resolvers:
            - resolver: usernameMatchingUserEntityName
              dangerouslyAllowSignInWithoutUserInCatalog: true

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}
      apps:
        - appId: ${GITHUB_APP_ID}
          clientId: ${GITHUB_APP_CLIENT_ID}
          clientSecret: ${GITHUB_APP_CLIENT_SECRET}
          privateKey: ${GITHUB_APP_PRIVATE_KEY}

proxy:
  endpoints:

techdocs:
  builder: local
  generator:
    runIn: local
  publisher:
    type: local

scaffolder: {}

catalog:
  rules:
    - allow: [Component, System, API, Resource, Location, Domain, Template, User, Group]
  locations:
    # -----------------------------------------------------------------
    # Golden Path Templates from GitHub (all 22)
    # -----------------------------------------------------------------
    # H1 Foundation
    - type: url
      target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/${GITHUB_BRANCH:-main}/golden-paths/h1-foundation/basic-cicd/template.yaml
      rules:
        - allow: [Template]
    - type: url
      target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/${GITHUB_BRANCH:-main}/backstage/examples/org.yaml
      rules:
        - allow: [User, Group, Domain, System]
    - type: url
      target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/${GITHUB_BRANCH:-main}/backstage/examples/entities.yaml
    - type: url
      target: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}/blob/${GITHUB_BRANCH:-main}/backstage/catalog-info.yaml

permission:
  enabled: true

kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters: []
