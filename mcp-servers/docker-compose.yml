services:
  mcp-ecosystem:
    build: .
    container_name: mcp-ecosystem
    restart: unless-stopped
    ports:
      # Host port is configurable to avoid local collisions (e.g. Grafana Loki
      # also defaults to 3100). Override with MCP_ECOSYSTEM_PORT, e.g.
      #   MCP_ECOSYSTEM_PORT=3101 docker compose up -d
      - "${MCP_ECOSYSTEM_PORT:-3100}:3100"
    env_file:
      # Optional: provide GH_TOKEN / CACHE_TTL_MS to raise upstream rate limits.
      # Not required to run locally during installation.
      - path: .env
        required: false
    environment:
      - PORT=3100
      - CACHE_DIR=/app/cache
    volumes:
      - mcp-cache:/app/cache
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3100/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  mcp-cache:
    driver: local
