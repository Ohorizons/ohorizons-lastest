name: Validate Agents

on:
  push:
    paths:
      - ".github/agents/**"
      - ".github/prompts/**"
      - ".github/skills/**/SKILL.md"
      - ".github/instructions/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/skills/validation-scripts/scripts/validate-agents.py"
      - "golden-paths/common/agents/**"
  pull_request:
    paths:
      - ".github/agents/**"
      - ".github/prompts/**"
      - ".github/skills/**/SKILL.md"
      - ".github/instructions/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/skills/validation-scripts/scripts/validate-agents.py"
      - "golden-paths/common/agents/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validator dependencies
        run: python -m pip install pyyaml

      - name: Run Validation Script
        run: |
          chmod +x .github/skills/validation-scripts/scripts/validate-agents.py
          ./.github/skills/validation-scripts/scripts/validate-agents.py
